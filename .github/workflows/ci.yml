name: CI

on:
  push:
    branches: [master, main, develop]
    paths:
      - ".github/workflows/ci.yml"
      - "agfs-server/**"
      - "agfs-fuse/**"
      - "agfs-sdk/go/**"
      - "agfs-sdk/python/**"
      - "agfs-shell/**"
  pull_request:
    branches: [master, main, develop]
    paths:
      - ".github/workflows/ci.yml"
      - "agfs-server/**"
      - "agfs-fuse/**"
      - "agfs-sdk/go/**"
      - "agfs-sdk/python/**"
      - "agfs-shell/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agfs-shell-lint:
    name: agfs-shell lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agfs-shell
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check code formatting with Black
        run: uv run black --check agfs_shell/ tests/

      - name: Check import sorting with isort
        run: uv run isort --check-only agfs_shell/ tests/

      - name: Lint with ruff
        run: uv run ruff check agfs_shell/ tests/

      - name: Type check with mypy
        run: uv run mypy agfs_shell/ --ignore-missing-imports
        continue-on-error: true

  agfs-shell-tests:
    name: agfs-shell tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: agfs-shell
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=agfs_shell --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: agfs-shell-coverage
          path: agfs-shell/coverage.xml

  go-tests:
    name: ${{ matrix.name }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agfs-sdk/go
            path: agfs-sdk/go
            go-version-file: agfs-sdk/go/go.mod
          - name: agfs-fuse
            path: agfs-fuse
            go-version-file: agfs-fuse/go.mod
          - name: agfs-server
            path: agfs-server
            go-version-file: agfs-server/go.mod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.go-version-file }}

      - name: Run Go tests
        working-directory: ${{ matrix.path }}
        run: go test -v ./...

  agfs-server-failpoint-tests:
    name: agfs-server failpoint tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agfs-server/go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install failpoint-ctl
        working-directory: agfs-server
        run: go install github.com/pingcap/failpoint/failpoint-ctl@latest

      - name: Run failpoint tests
        working-directory: agfs-server
        run: python3 scripts/run_failpoint_tests.py
